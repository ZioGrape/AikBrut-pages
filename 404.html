<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect
      var path = window.location.pathname || '/'
      window.location.replace(
        window.location.origin + '/?r=' + encodeURIComponent(path + window.location.search) + window.location.hash
      )
    </script>
  </head>
</html>
